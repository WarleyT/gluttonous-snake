<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gluttonous Snake — Retro Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cabinet-bg: #1a0a0a;
      --cabinet-frame: #2c1810;
      --cabinet-trim: #c4a35a;
      --screen-bg: #0a0a0a;
      --neon-red: #ff3333;
      --neon-blue: #3388ff;
      --neon-yellow: #ffdd00;
      --neon-green: #33ff55;
      --text-glow: #fff8e0;
      --scanline-opacity: 0.06;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d0d0d;
      background-image:
        radial-gradient(ellipse at 50% 30%, rgba(255, 51, 51, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse at 80% 70%, rgba(51, 136, 255, 0.06) 0%, transparent 60%);
      font-family: 'VT323', 'Courier New', monospace;
      padding: 20px;
    }

    /* ===== ARCADE CABINET ===== */
    .arcade-cabinet {
      width: min(980px, 100%);
      background: var(--cabinet-frame);
      border: 6px solid #1a0a08;
      border-radius: 18px;
      box-shadow:
        0 0 0 4px #3d2218,
        0 0 0 10px #1a0a08,
        0 0 0 14px #5c3a28,
        0 20px 80px rgba(0,0,0,0.7),
        inset 0 0 60px rgba(0,0,0,0.4);
      padding: 18px 18px 24px;
      position: relative;
    }

    /* Marquee / top light bar */
    .arcade-marquee {
      background: linear-gradient(180deg, #ffe066 0%, #ffaa00 40%, #cc7700 100%);
      border: 3px solid #8b5e3c;
      border-radius: 6px;
      padding: 10px 20px;
      text-align: center;
      margin-bottom: 14px;
      box-shadow:
        0 0 30px rgba(255,170,0,0.5),
        inset 0 2px 8px rgba(255,255,255,0.3);
      position: relative;
      overflow: hidden;
    }

    .arcade-marquee::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.1) 3px,
        rgba(255,255,255,0.1) 6px
      );
      pointer-events: none;
    }

    .marquee-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.1rem;
      color: #1a0500;
      text-shadow: 0 1px 0 rgba(255,255,255,0.5);
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
    }

    /* ===== CRT SCREEN AREA ===== */
    .crt-screen {
      background: var(--screen-bg);
      border: 8px solid #1c110e;
      border-radius: 22px;
      padding: 16px;
      position: relative;
      box-shadow:
        inset 0 0 120px rgba(0,0,0,0.8),
        0 0 0 3px #3a2218;
      overflow: hidden;
    }

    /* Scanlines overlay */
    .crt-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 20;
      border-radius: 14px;
    }

    /* CRT vignette */
    .crt-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 19;
      border-radius: 14px;
    }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 200px;
      grid-template-rows: auto auto auto;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255,221,0,0.3);
    }

    .title-block h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.85rem;
      color: var(--neon-yellow);
      text-shadow:
        0 0 10px rgba(255,221,0,0.6),
        0 0 30px rgba(255,221,0,0.3);
      line-height: 1.4;
    }

    .title-block .subtitle {
      font-family: 'VT323', monospace;
      font-size: 1.3rem;
      color: var(--neon-red);
      text-shadow: 0 0 8px rgba(255,51,51,0.5);
      margin-top: 2px;
    }

    /* Stats in retro 7-segment style */
    .score-strip {
      display: flex;
      gap: 10px;
    }

    .stat-box {
      background: #0a0a0a;
      border: 2px solid #333;
      border-radius: 4px;
      padding: 6px 12px;
      text-align: center;
      min-width: 80px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 0 0 1px #222;
    }

    .stat-box .label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      color: #887755;
      display: block;
      margin-bottom: 3px;
      letter-spacing: 1px;
    }

    .stat-box .value {
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      color: var(--neon-green);
      text-shadow: 0 0 6px rgba(51,255,85,0.5);
      line-height: 1;
    }

    /* ===== GAME BOARD (mock) ===== */
    .play-area {
      grid-row: span 2;
      aspect-ratio: 1;
      background: #0d1110;
      border: 3px solid #332211;
      border-radius: 4px;
      display: grid;
      grid-template-columns: repeat(22, 1fr);
      grid-template-rows: repeat(22, 1fr);
      gap: 0;
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.5),
        0 0 20px rgba(51,136,255,0.15);
      position: relative;
      overflow: hidden;
    }

    /* Checkered grid */
    .play-area .cell {
      border: 0.5px solid rgba(255,255,255,0.04);
    }

    .play-area .cell:nth-child(odd) { background: rgba(255,255,255,0.015); }

    /* Snake mock segments on the board */
    .snake-seg {
      background: var(--neon-green) !important;
      border-color: rgba(51,255,85,0.3) !important;
      box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
    }
    .snake-head {
      background: #aaffcc !important;
      border-color: rgba(170,255,204,0.5) !important;
    }
    .food-dot {
      background: var(--neon-red) !important;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,51,51,0.7);
    }

    /* INSERT COIN overlay */
    .insert-coin {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 10;
    }

    .insert-coin span {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      color: var(--neon-yellow);
      text-shadow:
        0 0 10px rgba(255,221,0,0.8),
        0 0 30px rgba(255,221,0,0.5);
      animation: coin-blink 1.2s steps(1) infinite;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border: 2px dashed rgba(255,221,0,0.5);
      border-radius: 4px;
    }

    @keyframes coin-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ===== SIDE PANEL ===== */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-box {
      background: #0a0a0a;
      border: 2px solid #332211;
      border-radius: 4px;
      padding: 10px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
    }

    .panel-box h3 {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--neon-yellow);
      margin-bottom: 8px;
      text-shadow: 0 0 6px rgba(255,221,0,0.4);
    }

    .retro-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: #fff;
      background: linear-gradient(180deg, #444 0%, #222 100%);
      border: 2px solid #555;
      border-radius: 3px;
      cursor: pointer;
      text-align: center;
      text-shadow: 0 1px 0 #000;
      box-shadow: 0 3px 0 #111, 0 4px 8px rgba(0,0,0,0.3);
      transition: transform 50ms, box-shadow 50ms;
    }

    .retro-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #111, 0 2px 4px rgba(0,0,0,0.3);
    }

    .retro-btn.red { border-color: #cc2222; color: #ff6666; }
    .retro-btn.blue { border-color: #2266cc; color: #6699ff; }

    .retro-select {
      width: 100%;
      padding: 6px 8px;
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: var(--neon-green);
      background: #0a0a0a;
      border: 2px solid #333;
      border-radius: 3px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    /* ===== D-PAD ===== */
    .dpad-area {
      grid-column: 1;
      display: flex;
      justify-content: center;
      padding: 8px 0;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 3px;
    }

    .dpad button {
      width: 48px;
      height: 48px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      color: #fff;
      background: linear-gradient(180deg, #3a3a3a 0%, #1a1a1a 100%);
      border: 2px solid #555;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 3px 0 #0a0a0a;
      transition: transform 50ms, box-shadow 50ms;
    }

    .dpad button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0a0a0a;
    }

    .dpad .up { grid-column: 2; grid-row: 1; }
    .dpad .left { grid-column: 1; grid-row: 2; }
    .dpad .center { grid-column: 2; grid-row: 2; background: #1a1a1a; border-color: #333; }
    .dpad .right { grid-column: 3; grid-row: 2; }
    .dpad .down { grid-column: 2; grid-row: 3; }

    /* ===== LEADERBOARD ===== */
    .leaderboard-section {
      grid-column: 1 / -1;
      margin-top: 8px;
    }

    .lb-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(255,51,51,0.3);
    }

    .lb-header h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: var(--neon-red);
      text-shadow: 0 0 8px rgba(255,51,51,0.4);
    }

    .lb-tabs {
      display: flex;
      gap: 4px;
    }

    .lb-tab {
      padding: 3px 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      color: #887755;
      background: #111;
      border: 1px solid #333;
      border-radius: 2px;
      cursor: pointer;
    }

    .lb-tab.active {
      color: var(--neon-yellow);
      border-color: var(--neon-yellow);
      text-shadow: 0 0 6px rgba(255,221,0,0.4);
    }

    .lb-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      list-style: none;
      padding: 0;
    }

    .lb-entry {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 2px;
      font-size: 1rem;
    }

    .lb-rank { color: var(--neon-yellow); font-family: 'Press Start 2P', monospace; font-size: 0.5rem; }
    .lb-name { color: #ddd; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { color: var(--neon-green); font-family: 'Press Start 2P', monospace; font-size: 0.45rem; }

    /* Coin slot graphic */
    .coin-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      padding-top: 8px;
      margin-top: 10px;
      border-top: 2px solid #332211;
    }

    .coin-slot .slot-icon {
      width: 40px;
      height: 8px;
      background: #111;
      border: 2px solid #555;
      border-radius: 4px;
      position: relative;
    }

    .coin-slot .slot-icon::after {
      content: '';
      position: absolute;
      right: -8px;
      top: -6px;
      width: 18px;
      height: 18px;
      background: radial-gradient(circle, #ffd700, #b8860b);
      border-radius: 50%;
      border: 2px solid #8b6914;
    }

    .coin-slot span {
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      color: #887755;
    }

    /* Responsive */
    @media (max-width: 820px) {
      .game-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }
      .side-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .dpad-area { order: 10; }
      .lb-list { grid-template-columns: 1fr; }
    }

    @media (max-width: 460px) {
      .arcade-cabinet { padding: 10px 10px 16px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .score-strip { flex-wrap: wrap; }
      .stat-box { min-width: 60px; }
      .stat-box .value { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="arcade-cabinet">
  <!-- Marquee -->
  <div class="arcade-marquee">
    <div class="marquee-title">⬥ GLUTTONOUS SNAKE ⬥</div>
  </div>

  <!-- CRT Screen -->
  <div class="crt-screen">
    <div class="game-layout">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="title-block">
          <h1>贪吃蛇</h1>
          <div class="subtitle">1UP · 00</div>
        </div>
        <div class="score-strip">
          <div class="stat-box"><span class="label">SCORE</span><span class="value">0000</span></div>
          <div class="stat-box"><span class="label">HI-SC</span><span class="value">3200</span></div>
          <div class="stat-box"><span class="label">LEN</span><span class="value">003</span></div>
          <div class="stat-box"><span class="label">SPD</span><span class="value">1.0x</span></div>
        </div>
      </header>

      <!-- Game Board (mock) -->
      <div class="play-area" id="gameBoard">
        <!-- INSERT COIN overlay -->
        <div class="insert-coin"><span>▶ INSERT COIN</span></div>
      </div>

      <!-- Side Panel -->
      <aside class="side-panel">
        <div class="panel-box">
          <h3>▶ MODE</h3>
          <select class="retro-select">
            <option>经典 CLASSIC</option>
            <option selected>穿墙 WRAP</option>
            <option>极速 RUSH</option>
            <option>狂吃 FEAST</option>
          </select>
        </div>
        <div class="panel-box">
          <h3>▶ THEME</h3>
          <select class="retro-select">
            <option>霓虹 NEON</option>
            <option>薄荷 MINT</option>
            <option>余烬 EMBER</option>
          </select>
        </div>
        <div class="panel-box">
          <button class="retro-btn red">▶ START</button>
          <button class="retro-btn blue">⏸ PAUSE</button>
          <button class="retro-btn">🔊 SOUND</button>
        </div>
      </aside>

      <!-- D-Pad -->
      <div class="dpad-area">
        <div class="dpad">
          <button class="up" aria-label="上">▲</button>
          <button class="left" aria-label="左">◀</button>
          <div class="center"></div>
          <button class="right" aria-label="右">▶</button>
          <button class="down" aria-label="下">▼</button>
        </div>
      </div>

      <!-- Leaderboard -->
      <section class="leaderboard-section">
        <div class="lb-header">
          <h2>🏆 RANKING</h2>
          <div class="lb-tabs">
            <button class="lb-tab">CLS</button>
            <button class="lb-tab active">WRP</button>
            <button class="lb-tab">RSH</button>
            <button class="lb-tab">FST</button>
          </div>
        </div>
        <ol class="lb-list">
          <li class="lb-entry"><span class="lb-rank">#01</span><span class="lb-name">SNAKE.KING</span><span class="lb-score">3200</span></li>
          <li class="lb-entry"><span class="lb-rank">#02</span><span class="lb-name">PIXEL.WAR</span><span class="lb-score">2840</span></li>
          <li class="lb-entry"><span class="lb-rank">#03</span><span class="lb-name">8BIT.HERO</span><span class="lb-score">2610</span></li>
          <li class="lb-entry"><span class="lb-rank">#04</span><span class="lb-name">RETRO.FAN</span><span class="lb-score">2390</span></li>
          <li class="lb-entry"><span class="lb-rank">#05</span><span class="lb-name">JOYSTICK</span><span class="lb-score">2150</span></li>
          <li class="lb-entry"><span class="lb-rank">#06</span><span class="lb-name">COIN.OP</span><span class="lb-score">1980</span></li>
        </ol>
      </section>
    </div>
  </div>

  <!-- Coin Slot -->
  <div class="coin-slot">
    <div class="slot-icon"></div>
    <span>CREDITS: 99</span>
  </div>
</div>

<script>
  // Generate checkered board
  const board = document.getElementById('gameBoard');
  const GRID = 22;
  for (let i = 0; i < GRID * GRID; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    board.appendChild(cell);
  }

  // Draw mock snake
  const snakeCells = [265, 266, 267, 268, 269]; // ~center
  snakeCells.forEach((idx, i) => {
    const cell = board.children[idx];
    cell.classList.add(i === 0 ? 'snake-head' : 'snake-seg');
  });

  // Draw mock food dots
  [145, 310, 398].forEach(idx => {
    board.children[idx]?.classList.add('food-dot');
  });
</script>

</body>
</html>
